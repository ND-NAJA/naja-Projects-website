<script src="../../_ds_bundle.js?v=25"></script>

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<body>
<div id="root"></div>
<script type="text/babel" src="Screens1.jsx"></script>
<script type="text/babel" src="Screens2.jsx"></script>
<script type="text/babel">
const { Nav, Footer, CookieBanner } = window.NajaProjectsDesignSystem_b735cb;

function App() {
  const [route, setRoute] = React.useState('/');
  const [cookieVisible, setCookieVisible] = React.useState(false);
  React.useEffect(() => { const t = setTimeout(() => setCookieVisible(true), 600); return () => clearTimeout(t); }, []);
  const nav = (path) => {
    if (path.startsWith('#')) { document.getElementById(path.slice(1))?.scrollIntoView({ behavior: 'smooth' }); return; }
    setRoute(path); window.scrollTo(0, 0);
  };
  const screens = {
    '/': () => window.NajaScreens1.Home({ nav }),
    '/tech/': () => window.NajaScreens1.TechScreen({ nav }),
    '/coaching/': () => window.NajaScreens2.CoachingScreen({ nav }),
    '/build/': () => window.NajaScreens2.BuildScreen({ nav }),
    '/pipeline/': () => window.NajaScreens2.PipelineScreen({ nav }),
    '/contact/': () => window.NajaScreens2.ContactScreen({ nav }),
  };
  return (<div style={{minHeight:'100vh'}}>
    <Nav activePath={route} onNavigate={nav} logoSrc="../../assets/logo-icon-navy.png" />
    <main>{screens[route] ? screens[route]() : screens['/']()}</main>
    <Footer onCookieSettings={() => setCookieVisible(true)} />
    <CookieBanner visible={cookieVisible} onAccept={() => setCookieVisible(false)} onDecline={() => setCookieVisible(false)} />
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
