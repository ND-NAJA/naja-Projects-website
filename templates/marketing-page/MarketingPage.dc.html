<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Naja Marketing Sub-Page" description="Blueprint-navy sub-page: nav, hero, detail section with callout, CTA, footer" -->
<helmet><script src="./ds-base.js"></script></helmet>
<div>
<x-import component-from-global-scope="NajaProjectsDesignSystem_b735cb.Nav" active-path="/coaching/" logo-src="../../assets/logo-icon-navy.png"></x-import>
<x-import component-from-global-scope="NajaProjectsDesignSystem_b735cb.PageHero" eyebrow="02 — Coaching" title="Headline goes here." description="One sentence describing this venture or offering."></x-import>
<section style="padding:80px 0 120px">
<div class="wrap" style="max-width:1180px;margin:0 auto;padding:0 32px;display:grid;grid-template-columns:1.1fr 1fr;gap:60px;align-items:start">
<div>
<p style="max-width:480px;font-size:15px;color:var(--text-dim)">Replace this paragraph with the section's lead copy — one to two sentences, direct and specific.</p>
<x-import component-from-global-scope="NajaProjectsDesignSystem_b735cb.FeatureList" items="{{ features }}"></x-import>
</div>
<x-import component-from-global-scope="NajaProjectsDesignSystem_b735cb.CalloutBox" title="Callout heading" on-dark="{{ true }}">Supporting detail or a quote-like aside goes here.</x-import>
</div>
</section>
<section class="grid-bg" style="padding:130px 0;text-align:center;position:relative">
<div class="wrap" style="max-width:1180px;margin:0 auto;padding:0 32px">
<h2 style="font-size:clamp(2rem,4.6vw,3.2rem);color:#fff;max-width:700px;margin:0 auto">Ready to talk it through?</h2>
<p style="color:var(--text-dim);margin-top:20px;max-width:480px;margin-left:auto;margin-right:auto">One line prompting the visitor toward contact.</p>
<div style="display:flex;justify-content:center;gap:18px;margin-top:40px;flex-wrap:wrap">
<x-import component-from-global-scope="NajaProjectsDesignSystem_b735cb.Button" variant="primary" href="/contact/">Get in touch</x-import>
<x-import component-from-global-scope="NajaProjectsDesignSystem_b735cb.Button" variant="ghost" href="/">Back home</x-import>
</div>
</div>
</section>
<x-import component-from-global-scope="NajaProjectsDesignSystem_b735cb.Footer"></x-import>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      features: [
        'First feature or benefit, stated plainly',
        'Second feature or benefit',
        'Third feature or benefit',
      ],
    };
  }
}
</script>
</body>
</html>
